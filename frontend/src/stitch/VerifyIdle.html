<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#d2bbff",
                        "outline": "#958da1",
                        "on-secondary-fixed": "#1a1a2e",
                        "surface-container-highest": "#34343d",
                        "on-secondary-container": "#b8b6d0",
                        "inverse-on-surface": "#302f39",
                        "tertiary": "#c5c3e6",
                        "tertiary-container": "#646482",
                        "secondary-container": "#47475d",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#444461",
                        "surface-variant": "#34343d",
                        "on-tertiary-fixed": "#191933",
                        "secondary-fixed": "#e2e0fc",
                        "surface-container-lowest": "#0d0d16",
                        "on-secondary": "#2f2e43",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#45455b",
                        "on-tertiary": "#2e2e49",
                        "background": "#0a0a12",
                        "secondary-fixed-dim": "#c6c4df",
                        "secondary": "#c6c4df",
                        "surface-dim": "#13131b",
                        "on-surface-variant": "#ccc3d8",
                        "on-primary-container": "#ede0ff",
                        "on-error": "#690005",
                        "inverse-surface": "#e4e1ed",
                        "tertiary-fixed-dim": "#c5c3e6",
                        "primary": "#d2bbff",
                        "outline-variant": "#4a4455",
                        "on-background": "#e4e1ed",
                        "surface-container-high": "#292932",
                        "tertiary-fixed": "#e2dfff",
                        "surface": "#13131b",
                        "primary-fixed": "#eaddff",
                        "on-surface": "#e4e1ed",
                        "surface-bright": "#393842",
                        "on-tertiary-container": "#e5e3ff",
                        "on-primary-fixed": "#25005a",
                        "primary-container": "#7c3aed",
                        "on-primary-fixed-variant": "#5a00c6",
                        "on-primary": "#3f008e",
                        "surface-tint": "#d2bbff",
                        "surface-container": "#1f1f27",
                        "surface-container-low": "#1b1b23",
                        "error": "#ffb4ab",
                        "inverse-primary": "#732ee4"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0a0a12;
            color: #e4e1ed;
            font-family: 'Inter', sans-serif;
        }
        .headline-font {
            font-family: 'Manrope', sans-serif;
        }
        .glass-effect {
            background: rgba(19, 19, 27, 0.6);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen selection:bg-primary-container/30">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-40 bg-[#13131b]/60 backdrop-blur-xl flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="auto_awesome">auto_awesome</span>
<h1 class="text-xl font-extrabold headline-font tracking-tighter text-on-background">FactGuard</h1>
</div>
<button class="hover:bg-surface-container-highest rounded-full p-2 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-24 max-w-md mx-auto w-full">
<!-- Hero Visual -->
<div class="mb-8 flex flex-col items-center">
<div class="w-20 h-20 bg-[#1A1A2E] rounded-3xl flex items-center justify-center mb-6 shadow-2xl relative">
<div class="absolute inset-0 bg-primary-container/10 blur-xl rounded-full"></div>
<span class="material-symbols-outlined text-primary text-4xl relative z-10" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h2 class="text-2xl font-bold headline-font text-center text-on-background tracking-tight mb-2">Verify any claim or article</h2>
<p class="text-sm text-on-surface-variant text-center font-medium leading-relaxed max-w-[280px]">Paste article text or a URL to extract factual claims...</p>
</div>
<!-- Verification Panel -->
<section class="w-full bg-[#13131F] rounded-3xl p-5 shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-outline-variant/10">
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container-lowest rounded-2xl mb-5">
<button class="flex-1 py-2.5 text-sm font-semibold rounded-xl bg-surface-container-high text-on-background transition-all">
                    Paste Text
                </button>
<button class="flex-1 py-2.5 text-sm font-medium rounded-xl text-on-surface-variant hover:text-on-background transition-all">
                    Enter URL
                </button>
</div>
<!-- Input Area -->
<div class="relative mb-5">
<textarea class="w-full h-40 bg-[#1A1A2E] border border-[#252540] rounded-2xl p-4 text-on-surface text-sm focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none resize-none placeholder:text-on-surface-variant/40 font-body" placeholder="Enter the text you want to fact-check..."></textarea>
<div class="absolute bottom-3 right-3 flex items-center gap-2 opacity-40">
<span class="text-[10px] font-bold tracking-widest uppercase">0 / 5000</span>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-primary-container/20">
<span class="text-base">Verify Now</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</section>
<!-- Quick Start Chips -->
<div class="mt-8 w-full flex flex-col gap-3">
<span class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-on-surface-variant/50 text-center">Suggestions</span>
<div class="flex flex-wrap justify-center gap-2">
<button class="bg-surface-container-low hover:bg-surface-container-high border border-outline-variant/10 px-4 py-2 rounded-full text-xs font-semibold text-on-surface-variant transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="article">article</span>
                    Try a sample article
                </button>
<button class="bg-surface-container-low hover:bg-surface-container-high border border-outline-variant/10 px-4 py-2 rounded-full text-xs font-semibold text-on-surface-variant transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="link">link</span>
                    Try a news URL
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 md:hidden rounded-t-3xl bg-[#0d0d16] border-t border-[#4a4455]/15 shadow-[0_-10px_30px_rgba(5,5,8,0.1)] flex justify-around items-center h-20 px-4 pb-safe">
<!-- Active Item: Verify/Dashboard -->
<div class="bg-primary-container text-on-primary-container rounded-2xl px-6 py-2 flex flex-col items-center scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="fact_check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">fact_check</span>
<span class="text-[10px] font-medium Inter uppercase tracking-widest mt-0.5">Verify</span>
</div>
<div class="text-[#e4e1ed]/50 flex flex-col items-center p-2 hover:text-[#7c3aed] transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[10px] font-medium Inter uppercase tracking-widest mt-0.5">History</span>
</div>
<div class="text-[#e4e1ed]/50 flex flex-col items-center p-2 hover:text-[#7c3aed] transition-colors">
<span class="material-symbols-outlined" data-icon="trending_up">trending_up</span>
<span class="text-[10px] font-medium Inter uppercase tracking-widest mt-0.5">Trends</span>
</div>
<div class="text-[#e4e1ed]/50 flex flex-col items-center p-2 hover:text-[#7c3aed] transition-colors">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="text-[10px] font-medium Inter uppercase tracking-widest mt-0.5">Profile</span>
</div>
</nav>
</body></html>
